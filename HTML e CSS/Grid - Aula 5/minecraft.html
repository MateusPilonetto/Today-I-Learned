<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="minecraft.css" />
    <link rel="icon" type="image/jpeg" href="mine.jpeg" />
    <title>Minecraft layout</title>
  </head>
  <body>
    <header>
      <h1><</h1>

      <h1>PLAY</h1>

      <div class="barra">
        <a href="#">
          <span id="social">
            <img
              src="IconS.jpg"
              alt="Icone Social para conectar com os amigos"
              width="25px"
              height="25px"
            />
            Social (0)</span
          ></a
        >
      </div>
    </header>

    <nav class="navbar">
      <div class="mundos cor tamanho ativo">
        <span>
          <img
            src="worlds.jpeg"
            alt="Icone de mundos"
            width="25px"
            height="25px"
            id="imagem"
          />
          Worlds (1)
        </span>
      </div>

      <div class="realms cor tamanho">
        <span>
          <img
            src="realms.jpeg"
            alt="Icone Social para conectar com os amigos"
            width="25px"
            height="25px"
            id="imagem"
          />
          Realms
        </span>
      </div>

      <div class="Servers cor tamanho">
        <span>
          <img
            src="server.jpeg"
            alt="Icone Social para conectar com os amigos"
            width="25px"
            height="25px"
            id="imagem"
          />
          Servers
        </span>
      </div>
    </nav>
    <div class="novoM">
      <button id="buttonM">Create new world</button>
    </div>
    <section class="mundosC">
      <div class="meuMundo">
        <div class="tumb">
          <img
            src="tumbinail.jpg"
            alt="#"
            width="165"
            height="90"
            id="imagemM"
          />
        </div>
        <div class="desc">
          <span>My World</span>
          <br />
          <div class="creative">
            <span id="fundoG">Creative </span>
            <span id="fundoA"> Experimental </span>
          </div>
        </div>

        <div class="infos">
          <span>2.3MB</span>
          <span>02/26/26</span>
        </div>

        <div class="editar">
          <img
            src="pencil.jpg.png"
            alt="Ícone de lápis para editar mundo"
            width="40vw"
            height="40vh"
          />
          <br />
          <span id="edit">Edit</span>
        </div>
      </div>
    </section>
  </body>
</html>
