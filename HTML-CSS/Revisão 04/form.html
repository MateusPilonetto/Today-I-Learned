<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="form.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=SN+Pro:ital,wght@0,200..900;1,200..900&family=Ysabeau+Office:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />
    <title>Aula 4</title>
  </head>
  <body>
    <header>
      <h1>Revisão Aula 04 - HTML</h1>
    </header>

    <main>
      <section>
        <form action="#" method="post" class="formCadastro">
          <label for="nome">Digite seu nome:</label>
          <input type="text" name="nome" id="nome" />
          <br />
          <label for="email">Digite seu E-mail:</label>
          <input type="email" name="email" id="email" />
          <br />
          <label for="password">Crie uma senha:</label>
          <input type="password" name="senha" id="senha" />
          <br />
          <button type="submit" id="cadastro">Cadastrar</button>
        </form>

        <form action="#" method="get" class="formLogin">
          <label for="email">Digite seu E-mail:</label>
          <input type="email" name="email" id="email" />
          <br />
          <label for="password">Crie uma senha:</label>
          <input type="password" name="senha" id="senha" />
          <br />
          <button type="submit" id="cadastro">Entrar</button>
        </form>

        <!--  
        Com o método POST, fica apenas um # na barra de endereços diferente do GET que mostra todas as informações
        -->
      </section>

      <section>
        <form action="#" method="get" class="formLogin">
          <label for="date">Digite sua data de nascimento:</label>
          <input type="date" name="data" id="data" />
          <br />
          <label for="file">Escolha um arquivo:</label>
          <input type="file" name="arquivo" id="arquivo" />
          <br />
          <label for="checkbox" id="termos">
            <input type="checkbox" name="box" id="box" />
            <span>Aceito os termos</span>
          </label>
          <br />
          <label for="sexo" id="feminino">
            <input type="radio" name="sexo" id="sexo" value="feminino" />
            <span>Feminino</span>
          </label>
          <label for="sexo" id="masculino">
            <input type="radio" name="sexo" id="sexo" value="masculino" />
            <span>Masculino</span>
          </label>
          <br />
          <textarea
            name="texto"
            id="mensagem"
            rows="4"
            ,
            cols="30"
            ,
            maxlength="200"
            ,
            placeholder="Escreva sua mensagem..."
          ></textarea>
          <br />
          <label for="genero">
            <span> Escolha seu Genero Musical: </span>
            <select name="musica" id="musica">
              <option value="rock">Rock</option>
              <option value="Pop">Pop</option>
              <option value="romance">Romance</option>
              <option value="hiphop">Hip-Hop</option>
              <option value="Sertanejo">Sertanejo</option>
            </select>
          </label>
          <br />
          <button type="submit" id="cadastro">Enviar</button>
        </form>
      </section>
      <section class="media">
        <audio
          src="Taylor Swift - You Need To Calm Down - Taylor Swift (youtube).mp3"
          controls
        ></audio>
        <video
          src="Taylor Swift - Opalite (Official Music Video) - Taylor Swift (2160p, av1, youtube).mp4"
          controls
          width="300px"
        ></video>
        <br />
        <iframe
          width="400"
          height="250"
          src="https://www.youtube.com/embed/OBG50aoUwlI?si=hiSk6YN8jhdLJ3y-"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </section>
    </main>
  </body>
</html>
